<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000020"/>
    </filter>
  </defs>

  <text x="250" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#4a4a6a">Configuration — Resolution Priority</text>

  <!-- Priority 1 (highest) -->
  <rect x="50" y="60" width="400" height="50" rx="14" fill="#fce4ec" stroke="#f48fb1" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="90" font-size="13" font-weight="bold" fill="#c62828">1.  MDM Managed Settings</text>
  <text x="430" y="90" text-anchor="end" font-size="11" fill="#e57373">Highest priority</text>

  <!-- Priority 2 -->
  <rect x="75" y="125" width="375" height="50" rx="14" fill="#fff3e0" stroke="#ffcc80" stroke-width="2" filter="url(#shadow)"/>
  <text x="95" y="155" font-size="13" font-weight="bold" fill="#e65100">2.  Environment Variables</text>
  <text x="430" y="155" text-anchor="end" font-size="11" fill="#ffb74d">CLAUDE_*</text>

  <!-- Priority 3 -->
  <rect x="100" y="190" width="350" height="50" rx="14" fill="#fff9c4" stroke="#ffd54f" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="220" font-size="13" font-weight="bold" fill="#f57f17">3.  Global Config</text>
  <text x="430" y="220" text-anchor="end" font-size="11" fill="#fbc02d">~/.claude/config.json</text>

  <!-- Priority 4 -->
  <rect x="125" y="255" width="325" height="50" rx="14" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2" filter="url(#shadow)"/>
  <text x="145" y="285" font-size="13" font-weight="bold" fill="#2e7d32">4.  Project Config</text>
  <text x="430" y="285" text-anchor="end" font-size="11" fill="#66bb6a">CLAUDE.md</text>

  <!-- Priority 5 (lowest) -->
  <rect x="150" y="320" width="300" height="50" rx="14" fill="#e3f2fd" stroke="#90caf9" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="350" font-size="13" font-weight="bold" fill="#1565c0">5.  CLI Flags</text>
  <text x="430" y="350" text-anchor="end" font-size="11" fill="#64b5f6">Lowest priority</text>

  <!-- Side arrow -->
  <text x="30" y="215" text-anchor="middle" font-size="28" fill="#bdbdbd">&#x2B07;</text>
  <text x="30" y="245" text-anchor="middle" font-size="9" fill="#9e9e9e">Decreasing</text>
  <text x="30" y="258" text-anchor="middle" font-size="9" fill="#9e9e9e">priority</text>

  <text x="250" y="405" text-anchor="middle" font-size="11" fill="#888">Higher priority sources override lower ones</text>
</svg>