<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000020"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a7a9a"/>
    </marker>
  </defs>

  <text x="375" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#4a4a6a">Context Compaction — 3 Compression Levels</text>

  <!-- Level 1: Micro-compaction -->
  <rect x="40" y="65" width="210" height="160" rx="18" fill="#e1f5fe" stroke="#4fc3f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="145" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#0277bd">Level 1</text>
  <text x="145" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#0277bd">Micro-compaction</text>
  <line x1="60" y1="128" x2="230" y2="128" stroke="#4fc3f7" stroke-width="1"/>
  <text x="145" y="150" text-anchor="middle" font-size="11" fill="#01579b">No LLM call needed</text>
  <text x="145" y="170" text-anchor="middle" font-size="11" fill="#01579b">Removes redundant reads</text>
  <text x="145" y="188" text-anchor="middle" font-size="11" fill="#01579b">Truncates excessive output</text>
  <text x="145" y="206" text-anchor="middle" font-size="11" fill="#01579b">Noise cleanup</text>

  <!-- Level 2: Session Memory -->
  <rect x="270" y="65" width="210" height="160" rx="18" fill="#f3e5f5" stroke="#ce93d8" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#6a1b9a">Level 2</text>
  <text x="375" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#6a1b9a">Session Memory</text>
  <line x1="290" y1="128" x2="460" y2="128" stroke="#ce93d8" stroke-width="1"/>
  <text x="375" y="150" text-anchor="middle" font-size="11" fill="#4a148c">Extracts structured memories</text>
  <text x="375" y="170" text-anchor="middle" font-size="11" fill="#4a148c">Project structure</text>
  <text x="375" y="188" text-anchor="middle" font-size="11" fill="#4a148c">User preferences</text>
  <text x="375" y="206" text-anchor="middle" font-size="11" fill="#4a148c">Task progress</text>

  <!-- Level 3: Full Compaction -->
  <rect x="500" y="65" width="210" height="160" rx="18" fill="#fce4ec" stroke="#f48fb1" stroke-width="2" filter="url(#shadow)"/>
  <text x="605" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">Level 3</text>
  <text x="605" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#c62828">Full Compaction</text>
  <line x1="520" y1="128" x2="690" y2="128" stroke="#f48fb1" stroke-width="1"/>
  <text x="605" y="150" text-anchor="middle" font-size="11" fill="#b71c1c">Dedicated LLM call</text>
  <text x="605" y="170" text-anchor="middle" font-size="11" fill="#b71c1c">Full summarization</text>
  <text x="605" y="188" text-anchor="middle" font-size="11" fill="#b71c1c">Context Boundary msg</text>
  <text x="605" y="206" text-anchor="middle" font-size="11" fill="#b71c1c">New starting point</text>

  <!-- Flow arrows between levels -->
  <line x1="250" y1="145" x2="268" y2="145" stroke="#7a7a9a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="145" x2="498" y2="145" stroke="#7a7a9a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Flow diagram below -->
  <rect x="100" y="270" width="550" height="200" rx="18" fill="#fafafa" stroke="#e0e0e0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="375" y="300" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a4a6a">Compaction Flow</text>

  <!-- /compact -->
  <rect x="130" y="320" width="120" height="35" rx="10" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1.5"/>
  <text x="190" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="#283593">/compact</text>
  <line x1="250" y1="337" x2="275" y2="337" stroke="#7a7a9a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- getMessages -->
  <rect x="280" y="320" width="160" height="35" rx="10" fill="#fff9c4" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="360" y="342" text-anchor="middle" font-size="10" fill="#f57f17">getMessagesAfter</text>
  <text x="360" y="352" text-anchor="middle" font-size="10" fill="#f57f17">CompactBoundary()</text>

  <!-- trySession -->
  <line x1="440" y1="337" x2="470" y2="337" stroke="#7a7a9a" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="475" y="320" width="150" height="35" rx="10" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="550" y="342" text-anchor="middle" font-size="10" fill="#6a1b9a">trySessionMemory</text>
  <text x="550" y="352" text-anchor="middle" font-size="10" fill="#6a1b9a">Compaction()</text>

  <!-- Success path -->
  <line x1="550" y1="355" x2="550" y2="380" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="565" y="374" font-size="9" fill="#66bb6a">OK</text>
  <rect x="475" y="385" width="150" height="30" rx="10" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="550" y="405" text-anchor="middle" font-size="10" fill="#2e7d32">postCompactCleanup</text>

  <!-- Failure path -->
  <line x1="475" y1="350" x2="375" y2="390" stroke="#ef5350" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="410" y="370" font-size="9" fill="#ef5350">Fail</text>
  <rect x="230" y="385" width="180" height="55" rx="10" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5"/>
  <text x="320" y="405" text-anchor="middle" font-size="10" fill="#c62828">microcompact()</text>
  <text x="320" y="420" text-anchor="middle" font-size="10" fill="#c62828">→ compactConversation()</text>
  <text x="320" y="435" text-anchor="middle" font-size="10" fill="#c62828">→ clear cache</text>
</svg>